name: Smoke Testing For Infra and Networking

on:
  workflow_call:

permissions:
  id-token: write
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: DEVENDRA-5470/banking-app-2-tier
          ref: main

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::824353504367:role/github-oidc-role
          aws-region: ap-south-1

      - name: Upload smoke_test.py to S3
        run: |
          aws s3 mb s3://824353504367-devops-scripts --region ap-south-1 2>/dev/null || true
          aws s3 cp smoke_test.py s3://824353504367-devops-scripts/smoke_test.py --region ap-south-1

      - name: Run Smoke Test on Fleet
        id: smoke
        run: |
          CMD_ID=$(aws ssm send-command \
            --targets "Key=tag:App,Values=flask" \
            --document-name "AWS-RunShellScript" \
            --parameters '{"commands":[
              "aws s3 cp s3://824353504367-devops-scripts/smoke_test.py /tmp/smoke_test.py",
              "pip3 install pymysql -q 2>/dev/null",
              "python3 /tmp/smoke_test.py",
              "rm /tmp/smoke_test.py"
            ]}' \
            --query 'Command.CommandId' \
            --output text \
            --region ap-south-1)
          echo "cmd_id=$CMD_ID" >> $GITHUB_OUTPUT

      - name: Show Results
        run: |
          sleep 30

          aws ssm list-command-invocations \
            --command-id "${{ steps.smoke.outputs.cmd_id }}" \
            --details \
            --region ap-south-1 \
            --output text

          FAILED=$(aws ssm list-command-invocations \
            --command-id "${{ steps.smoke.outputs.cmd_id }}" \
            --query "length(CommandInvocations[?Status=='Failed'])" \
            --output text \
            --region ap-south-1)

          [ "$FAILED" -gt 0 ] && \
            echo "::error::Smoke test failed on $FAILED instance(s)!" && \
            exit 1

          echo "✅ Smoke Test Passed!"