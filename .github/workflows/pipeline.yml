name: Main Pipeline for Orchestration

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify_connection:
    uses: ./.github/workflows/test_connection.yml
    permissions:
      id-token: write
      contents: read



  smoke_testing:
    needs: verify_connection
    uses: ./.github/workflows/smoke_testing.yml
    permissions:
      id-token: write
      contents: read

  build_push:
    needs: smoke_testing
    uses: ./.github/workflows/build_push.yml
    permissions:
      id-token: write
      contents: read

  deploying:
    needs: build_push
    uses: ./.github/workflows/deploy_push.yml
    permissions:
      id-token: write
      contents: read