name: Main Pipeline for Orchestration

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    uses: ./.github/workflows/test_connection.yml
    permissions:
      id-token: write
      contents: read

  test_fleet_health_envs:
    needs: verify
    uses: ./.github/workflows/test_fleet_health.yml
    permissions:
      id-token: write
      contents: read

  smoke_testing:
    needs: test_fleet_health_envs
    uses: ./.github/workflows/smoke_testing.yml
    permissions:
      id-token: write
      contents: read

  build_push:
    needs: smoke_testing
    uses: ./.github/workflows/build_push.yml
    permissions:
      id-token: write
      contents: read

  deploying:
    needs: build_push
    uses: ./.github/workflows/deploy_push.yml
    permissions:
      id-token: write
      contents: read